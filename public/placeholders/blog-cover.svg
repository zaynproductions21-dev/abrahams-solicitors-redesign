<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="Blog post cover placeholder — editorial feature image">
  <defs>
    <linearGradient id="blog-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#dc2626"/>
      <stop offset="100%" stop-color="#0b1e4a"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#blog-bg)"/>
  <g opacity="0.2" fill="#fff">
    <rect x="80" y="220" width="420" height="6" rx="3"/>
    <rect x="80" y="244" width="380" height="6" rx="3"/>
    <rect x="80" y="268" width="320" height="6" rx="3"/>
  </g>
  <g transform="translate(600 360)" text-anchor="middle" font-family="Georgia, serif">
    <text fill="#fff" font-size="44" font-weight="700">Legal Insight</text>
    <text y="36" fill="#fbbf24" font-size="14" letter-spacing="3">BLOG COVER PLACEHOLDER</text>
    <text y="64" fill="#ffffff99" font-size="13">Editorial cover photo for the article</text>
  </g>
