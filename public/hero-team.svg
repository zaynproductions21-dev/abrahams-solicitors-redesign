<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#34495e"/>
      <stop offset="100%" stop-color="#2c3e50"/>
    </linearGradient>
    <linearGradient id="floor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#243342"/>
      <stop offset="100%" stop-color="#1a252f"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="800" height="600" fill="url(#bg)"/>
  <!-- Floor / table area -->
  <rect x="0" y="400" width="800" height="200" fill="url(#floor)" rx="0"/>
  <!-- Table -->
  <rect x="150" y="360" width="500" height="20" rx="4" fill="#ca9c5e" opacity="0.6"/>
  <rect x="170" y="380" width="10" height="100" fill="#b8894a" opacity="0.4"/>
  <rect x="620" y="380" width="10" height="100" fill="#b8894a" opacity="0.4"/>
  <!-- Window / light source -->
  <rect x="550" y="40" width="200" height="280" rx="8" fill="#3d566e" opacity="0.5"/>
  <rect x="560" y="50" width="85" height="125" rx="4" fill="#4a6a85" opacity="0.4"/>
  <rect x="655" y="50" width="85" height="125" rx="4" fill="#4a6a85" opacity="0.4"/>
  <rect x="560" y="185" width="85" height="125" rx="4" fill="#4a6a85" opacity="0.4"/>
  <rect x="655" y="185" width="85" height="125" rx="4" fill="#4a6a85" opacity="0.4"/>
  <!-- Person 1 (left) - woman -->
  <circle cx="250" cy="200" r="40" fill="#e8c9a0"/>
  <rect x="210" y="240" width="80" height="130" rx="10" fill="#db4042"/>
  <rect x="220" y="240" width="60" height="20" rx="4" fill="#ffffff" opacity="0.3"/>
  <!-- Hair -->
  <ellipse cx="250" cy="185" rx="42" ry="30" fill="#2c1810"/>
  <circle cx="250" cy="200" r="38" fill="#e8c9a0"/>
  <!-- Person 2 (center) - man -->
  <circle cx="400" cy="190" r="42" fill="#d4a574"/>
  <rect x="355" y="232" width="90" height="140" rx="10" fill="#2c3e50"/>
  <rect x="365" y="232" width="70" height="20" rx="4" fill="#ffffff" opacity="0.3"/>
  <!-- Hair -->
  <ellipse cx="400" cy="175" rx="38" ry="22" fill="#1a1a1a"/>
  <circle cx="400" cy="190" r="40" fill="#d4a574"/>
  <!-- Tie -->
  <rect x="396" y="232" width="8" height="50" fill="#db4042"/>
  <!-- Person 3 (right) - woman -->
  <circle cx="530" cy="210" r="38" fill="#f0d5b8"/>
  <rect x="492" y="248" width="76" height="120" rx="10" fill="#ca9c5e"/>
  <rect x="502" y="248" width="56" height="18" rx="4" fill="#ffffff" opacity="0.3"/>
  <!-- Hair -->
  <ellipse cx="530" cy="195" rx="40" ry="28" fill="#3d2b1f"/>
  <circle cx="530" cy="210" r="36" fill="#f0d5b8"/>
  <!-- Documents on table -->
  <rect x="300" y="340" width="60" height="25" rx="2" fill="#ffffff" opacity="0.8"/>
  <rect x="310" y="346" width="40" height="2" fill="#ccc"/>
  <rect x="310" y="352" width="35" height="2" fill="#ccc"/>
  <rect x="310" y="358" width="25" height="2" fill="#ccc"/>
  <rect x="380" y="342" width="50" height="22" rx="2" fill="#ffffff" opacity="0.7"/>
  <rect x="388" y="348" width="34" height="2" fill="#ccc"/>
  <rect x="388" y="354" width="28" height="2" fill="#ccc"/>
  <!-- Laptop -->
  <rect x="440" y="335" width="70" height="30" rx="3" fill="#333" opacity="0.7"/>
  <rect x="445" y="338" width="60" height="22" rx="2" fill="#4a6a85" opacity="0.5"/>
  <rect x="430" y="365" width="90" height="5" rx="2" fill="#444" opacity="0.6"/>
  <!-- Pen -->
  <rect x="270" y="348" width="30" height="3" rx="1" fill="#db4042" opacity="0.8" transform="rotate(-15,285,349)"/>
  <!-- Bookshelf (background) -->
  <rect x="40" y="60" width="120" height="260" rx="4" fill="#3d566e" opacity="0.3"/>
  <rect x="50" y="70" width="100" height="15" rx="2" fill="#ca9c5e" opacity="0.3"/>
  <rect x="50" y="95" width="100" height="15" rx="2" fill="#db4042" opacity="0.2"/>
  <rect x="50" y="120" width="100" height="15" rx="2" fill="#4a6a85" opacity="0.3"/>
  <rect x="50" y="145" width="100" height="15" rx="2" fill="#ca9c5e" opacity="0.2"/>
  <rect x="50" y="170" width="100" height="15" rx="2" fill="#2c3e50" opacity="0.4"/>
  <rect x="50" y="195" width="100" height="15" rx="2" fill="#db4042" opacity="0.15"/>
  <rect x="50" y="220" width="100" height="15" rx="2" fill="#4a6a85" opacity="0.25"/>
</svg>
